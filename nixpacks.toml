[phases.setup]
nixPkgs = ["python312", "chromium"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && python -m pip install --upgrade pip && python -m pip install -r requirements.txt",
  ". /opt/venv/bin/activate && python -m playwright install chromium",
]

[start]
cmd = "python -u main.py"
